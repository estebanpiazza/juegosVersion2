<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Be Tech | Nivel</title>
    <link rel="stylesheet" href="estilos.css?v=35" />
  </head>
  <body class="game-body">
    <main class="game-page">
      <section class="game-panel" aria-labelledby="game-title">
        <nav class="game-topbar" aria-label="Navegación principal">
          <a class="back-link" href="index.html" aria-label="Volver a niveles">
            <span class="side-control-icon" aria-hidden="true">&larr;</span>
            <span class="side-control-label">Volver</span>
          </a>
        </nav>

        <h1 id="game-title" class="game-title">Nivel <span data-current-level>4</span></h1>

        <div class="game-frame">
          <div class="game-stage">
            <img class="game-stage-bg" src="assets/fondo.jpeg" alt="" data-level-bg />
            <div class="game-workspace">
              <section class="challenge-shell is-open" aria-live="polite">
                <div class="challenge-content" id="challenge-content"></div>
              </section>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js?v=25"></script>
  </body>
</html>
